services:
    web-pop-server:
        build:
            context: .
            dockerfile: Dockerfile
        pull_policy: always
        image: yashchauhan008/web-pop-server:latest
        platform: linux/amd64
        container_name: web-pop-server
        env_file:
            - ./.env.prod
        environment:
            - FCM_SERVICE_ACCOUNT_PATH=/app/fcm.json
        ports:
            - '3012:3012'
        volumes:
            - ./fcm.json:/app/fcm.json:ro
        command: >
            sh -c "FCM_SERVICE_ACCOUNT_PATH=/app/fcm.json dbmate up && npm run start"
